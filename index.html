<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボカロ歌詞クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- 1. メニュー画面 -->
    <div id="menu-screen" class="screen active">
      <h1>🎵 ボカロ歌詞クイズ</h1>
      
      <div class="setting-group">
        <label for="category-select">カテゴリー：</label>
        <select id="category-select">
          <option value="all">すべて</option>
          <option value="halloffame">殿堂入り限定</option>
          <option value="era">年代別</option>
        </select>
      </div>

      <div id="era-group" class="setting-group hidden">
        <label for="era-select">年代：</label>
        <select id="era-select">
          <option value="~2011">~2011年 (初期)</option>
          <option value="2012~2015">2012~2015年 (黄金期)</option>
          <option value="2016~2018">2016~2018年 (隆盛期)</option>
          <option value="2019~2021">2019~2021年 (現代)</option>
          <option value="2022~">2022年~ (最新)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="part-select">出題パート：</label>
        <select id="part-select">
          <option value="intro">歌い始め</option>
          <option value="chorus">サビ</option>
          <option value="prechorus">ラスサビ前</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="phrase-mode-select">出題形式：</label>
        <select id="phrase-mode-select">
          <option value="auto">自動 (15秒ごとに1行表示)</option>
          <option value="manual">手動 (ボタンで次の行を表示)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="player-mode-select">プレイ人数：</label>
        <select id="player-mode-select">
          <option value="solo">1人で遊ぶ (入力形式)</option>
          <option value="multi">みんなで遊ぶ (早押し・3択形式)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="count-select">問題数：</label>
        <select id="count-select">
          <option value="5">5問</option>
          <option value="10">10問</option>
        </select>
      </div>

      <button id="start-btn" class="btn primary">スタート！</button>
      
      <div class="admin-link-wrapper">
        <button id="open-admin-btn" class="subtle-link-btn">⚙️ 管理者メニュー</button>
      </div>
    </div>

    <!-- 2. ゲーム画面 -->
    <div id="game-screen" class="screen">
      <div class="game-header">
        <span id="question-progress">第 1 / 5 問</span>
        <span id="timer-display" class="timer">15</span>
        <button id="quit-btn" class="quit-btn">✕ 途中でやめる</button>
      </div>

      <div id="lyrics-box" class="lyrics-box"></div>

      <div id="manual-next-wrapper" class="hidden" style="margin-bottom: 15px;">
        <button id="next-phrase-btn" class="btn secondary">次のフレーズを表示</button>
      </div>

      <div id="solo-answer-area" class="answer-area">
        <input type="text" id="solo-input" placeholder="曲名を入力してください...">
        <div class="btn-group">
          <button id="solo-submit-btn" class="btn primary">回答する</button>
          <button id="pass-btn" class="btn secondary">パス</button>
        </div>
      </div>

      <div id="multi-answer-area" class="answer-area hidden">
        <button id="buzzer-btn" class="btn primary buzzer-btn">🔔 早押し！</button>
        <div id="choices-box" class="choices-box hidden">
          <button class="btn choice-btn"></button>
          <button class="btn choice-btn"></button>
          <button class="btn choice-btn"></button>
        </div>
      </div>
    </div>

    <!-- 3. 正解確認画面 -->
    <div id="answer-screen" class="screen">
      <h2 id="result-status">⭕ 正解！</h2>
      <div class="song-detail">
        <p><strong>曲名：</strong><span id="detail-title"></span></p>
        <p><strong>ボカロP：</strong><span id="detail-producer"></span></p>
        <p><strong>投稿年：</strong><span id="detail-year"></span></p>
      </div>
      <button id="next-question-btn" class="btn primary">次の問題へ</button>
    </div>

    <!-- 4. 最終結果画面 -->
    <div id="final-screen" class="screen">
      <h2>🎉 クイズ終了！</h2>
      <p class="final-score-text">
        あなたのスコア：<br>
        <span id="final-score" class="highlight-score">0</span> / <span id="final-total">0</span> 問正解
      </p>
      <button id="back-to-menu-btn" class="btn primary">メニューに戻る</button>
    </div>

    <!-- 5. 管理者画面 -->
    <div id="admin-screen" class="screen">
      <h2>⚙️ 管理者メニュー</h2>
      
      <!-- 追加楽曲一覧 -->
      <div class="admin-section">
        <h3>🎵 登録済み楽曲一覧</h3>
        <p class="admin-help-text">※ 楽曲をタップすると編集・削除ができます</p>
        <div id="admin-song-list" class="song-list-container"></div>
      </div>

      <hr class="divider">

      <!-- 楽曲追加・編集フォーム -->
      <div class="admin-section">
        <div class="form-header">
          <h3 id="form-title">➕ 新しい楽曲を追加</h3>
          <button id="reset-form-btn" type="button" class="btn secondary small-btn">新規登録に戻る</button>
        </div>
        
        <div id="admin-msg" class="message hidden"></div>

        <form id="add-song-form" onsubmit="return false;">
          <div class="form-group">
            <label for="add-title">曲名：</label>
            <input type="text" id="add-title" required placeholder="例: カゲロウデイズ">
          </div>

          <div class="form-group">
            <label for="add-producer">ボカロP：</label>
            <input type="text" id="add-producer" required placeholder="例: じん">
          </div>

          <div class="form-group">
            <label for="add-year">投稿年：</label>
            <input type="number" id="add-year" required placeholder="2011" value="2020">
          </div>

          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="add-halloffame"> 殿堂入り/伝説入り
            </label>
          </div>

          <h4>歌詞設定（1行につき1フレーズ・改行で指定）</h4>

          <div class="form-group">
            <label for="add-intro">歌い始め (intro)：</label>
            <textarea id="add-intro" rows="3" placeholder="8月1日の午後2時頃じゃない&#10;やけに眩しい日差しの中"></textarea>
          </div>

          <div class="form-group">
            <label for="add-prechorus">ラスサビ前 (prechorus)：</label>
            <textarea id="add-prechorus" rows="3" placeholder="パッと通らせたトラックが&#10;轢き殺して行く"></textarea>
          </div>

          <div class="form-group">
            <label for="add-chorus">サビ (chorus)：</label>
            <textarea id="add-chorus" rows="3" placeholder="「ああ、またダメだったか」と&#10;猫を抱きかかえて笑った"></textarea>
          </div>

          <div class="btn-group">
            <button type="button" id="save-song-btn" class="btn primary">保存する</button>
            <button type="button" id="delete-song-btn" class="btn danger hidden">削除する</button>
          </div>
        </form>
      </div>

      <div style="margin-top: 20px;">
        <button id="admin-back-btn" class="btn secondary">メニューに戻る</button>
      </div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
