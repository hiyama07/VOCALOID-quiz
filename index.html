<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボカロ歌詞クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <!-- 1. メニュー画面 -->
    <div id="menu-screen" class="screen active">
      <h1>ボカロ歌詞クイズ</h1>
      
      <div class="setting-group">
        <label for="category-select">カテゴリ</label>
        <select id="category-select">
          <option value="all">全曲</option>
          <option value="halloffame">殿堂入り / 伝説入り</option>
          <option value="era">年代別</option>
        </select>
      </div>

      <div id="era-group" class="setting-group hidden">
        <label for="era-select">年代選択</label>
        <select id="era-select">
          <option value="~2011">~ 2011年 (初期)</option>
          <option value="2012~2015">2012 ~ 2015年</option>
          <option value="2016~2018">2016 ~ 2018年</option>
          <option value="2019~2021">2019 ~ 2021年</option>
          <option value="2022~">2022年 ~</option>
        </select>
      </div>

      <!-- 出題パート選択 -->
      <div class="setting-group">
        <label for="part-select">出題パート</label>
        <select id="part-select">
          <option value="intro">歌い始め</option>
          <option value="chorus">サビ</option>
          <option value="prechorus">ラスサビ前</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="phrase-mode-select">フレーズ進行</label>
        <select id="phrase-mode-select">
          <option value="auto">自動 (15秒ごとに進行)</option>
          <option value="manual">手動 (ボタンで進める)</option>
        </select>
      </div>

      <!-- プレイモード（表示テキストのみ「複数人用(早押し3択)」に変更） -->
      <div class="setting-group">
        <label for="player-mode-select">プレイモード</label>
        <select id="player-mode-select">
          <option value="solo">1人プレイ (入力形式)</option>
          <option value="multi">複数人用(早押し3択)</option>
        </select>
      </div>

      <!-- 出題数 -->
      <div class="setting-group">
        <label for="count-select">出題数</label>
        <select id="count-select">
          <option value="5">5問</option>
          <option value="10" selected>10問</option>
          <option value="20">20問</option>
          <option value="50">50問</option>
        </select>
      </div>

      <button id="start-btn" class="btn primary">ゲームスタート！</button>

      <div class="admin-link-wrapper">
        <button id="open-admin-btn" class="subtle-link-btn">管理者メニュー</button>
      </div>
    </div>

    <!-- 2. クイズプレイ画面 -->
    <div id="game-screen" class="screen">
      <div class="game-header">
        <span id="question-progress">第 1 / 10 問</span>
        <div id="timer-display" class="timer">15</div>
        <button id="quit-btn" class="quit-btn">中断</button>
      </div>

      <div id="lyrics-box" class="lyrics-box"></div>

      <div id="manual-next-wrapper" class="hidden">
        <button id="next-phrase-btn" class="btn secondary">次のフレーズを表示</button>
      </div>

      <div id="solo-answer-area" class="setting-group">
        <input type="text" id="solo-input" placeholder="曲名を入力してください" autocomplete="off">
        <div class="btn-group">
          <button id="solo-submit-btn" class="btn primary">回答する</button>
          <button id="pass-btn" class="btn secondary">パス</button>
        </div>
      </div>

      <div id="multi-answer-area" class="setting-group hidden">
        <button id="buzzer-btn" class="btn primary">わかった！ (早押し)</button>
        <div id="choices-box" class="choices-box hidden">
          <button class="btn choice-btn secondary"></button>
          <button class="btn choice-btn secondary"></button>
          <button class="btn choice-btn secondary"></button>
        </div>
      </div>
    </div>

    <!-- 3. 問題結果画面 -->
    <div id="answer-screen" class="screen">
      <h2 id="result-status">⭕ 正解！</h2>
      <div class="song-detail">
        <h3 id="detail-title">曲名</h3>
        <p>ボカロP: <span id="detail-producer">P名</span></p>
        <p>投稿年: <span id="detail-year">2000年</span></p>
      </div>
      <button id="next-question-btn" class="btn primary">次の問題へ</button>
    </div>

    <!-- 4. 最終スコア画面 -->
    <div id="final-screen" class="screen">
      <h2>結果発表</h2>
      <div class="final-score-text">
        <p>あなたの正解数は...</p>
        <div class="highlight-score"><span id="final-score">0</span> / <span id="final-total">10</span></div>
      </div>
      <button id="back-to-menu-btn" class="btn primary">メニューに戻る</button>
    </div>

    <!-- 5. 管理者メニュー画面 -->
    <div id="admin-screen" class="screen">
      <div class="form-header">
        <h2>管理者メニュー</h2>
        <button id="close-admin-btn" class="btn secondary small-btn">戻る</button>
      </div>

      <div id="admin-msg" class="message hidden"></div>

      <div class="admin-section">
        <h3>新規楽曲の追加</h3>
        <form id="add-song-form">
          <div class="form-group">
            <label>タイトル *</label>
            <input type="text" id="add-title" required>
          </div>
          <div class="form-group">
            <label>ボカロP *</label>
            <input type="text" id="add-producer" required>
          </div>
          <div class="form-group">
            <label>投稿年 *</label>
            <input type="number" id="add-year" value="2020" required>
          </div>
          <div class="form-group checkbox-group">
            <label><input type="checkbox" id="add-halloffame"> 殿堂入り/伝説入り</label>
          </div>
          <div class="form-group">
            <label>歌い始め歌詞 (1行ずつ改行)</label>
            <textarea id="add-intro" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>サビ歌詞 (1行ずつ改行)</label>
            <textarea id="add-chorus" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>ラスサビ前歌詞 (1行ずつ改行)</label>
            <textarea id="add-prechorus" rows="3"></textarea>
          </div>
          <button type="submit" class="btn primary">楽曲をデータベースへ登録</button>
        </form>
      </div>

      <hr class="divider">

      <div class="admin-section">
        <h3>登録済み楽曲一覧 (初期楽曲含む)</h3>
        <p style="font-size:0.85rem; color:#94a3b8;">タップすると詳細画面で編集・削除ができます</p>
        <div id="song-list-container" class="song-list-container"></div>
      </div>
    </div>

    <!-- 6. 楽曲編集専用画面（完全独立画面） -->
    <div id="edit-song-screen" class="screen">
      <div class="form-header">
        <h2>楽曲情報の編集</h2>
        <button id="cancel-edit-btn" class="btn secondary small-btn">キャンセル</button>
      </div>

      <form id="edit-song-form" class="admin-section">
        <div class="form-group">
          <label>タイトル *</label>
          <input type="text" id="edit-title" required>
        </div>
        <div class="form-group">
          <label>ボカロP *</label>
          <input type="text" id="edit-producer" required>
        </div>
        <div class="form-group">
          <label>投稿年 *</label>
          <input type="number" id="edit-year" required>
        </div>
        <div class="form-group checkbox-group">
          <label><input type="checkbox" id="edit-halloffame"> 殿堂入り/伝説入り</label>
        </div>
        <div class="form-group">
          <label>歌い始め歌詞 (1行ずつ改行)</label>
          <textarea id="edit-intro" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>サビ歌詞 (1行ずつ改行)</label>
          <textarea id="edit-chorus" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>ラスサビ前歌詞 (1行ずつ改行)</label>
          <textarea id="edit-prechorus" rows="3"></textarea>
        </div>

        <div class="btn-group" style="margin-top: 1.5rem;">
          <button type="submit" class="btn primary">変更を保存</button>
          <button type="button" id="open-delete-modal-btn" class="btn danger">この楽曲を削除</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 7. 削除確認ポップアップ (モーダル) -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>⚠️ 楽曲の削除</h3>
      <p>本当に「<span id="delete-target-title"></span>」を削除しますか？</p>
      <p style="font-size:0.85rem; color:#f87171;">※この操作は取り消せません。</p>
      <div class="modal-actions" style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: flex-end;">
        <button id="cancel-delete-btn" class="btn secondary">キャンセル</button>
        <button id="confirm-delete-btn" class="btn danger">削除する</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
